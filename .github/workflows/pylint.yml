name: Pylint

on: [push]

jobs:
  build:
    # تعديل النظام إلى ويندوز لتوافق مكتبات الأداة
    runs-on: windows-latest
    strategy:
      matrix:
        # تحديث الإصدارات لتطابق بيئة عملك
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      # تحديث الـ Action لتفادي تحذيرات Node.js القديمة
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # إجبارية التثبيت هنا لمنع خطأ ModuleNotFoundError أثناء الفحص
        python -m pip install pylint customtkinter psutil
    - name: Analysing the code with pylint
      run: |
        # أسلوب الفحص المتوافق مع ملفات بايثون في بيئة ويندوز
        pylint (Get-ChildItem -Filter *.py -Recurse | Select-Object -ExpandProperty FullName)
